<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Motionly</title>
    <link rel="stylesheet" href="./src/app/styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Motionly V1</p>
          <h1>Motion Graphics Renderer</h1>
        </div>
        <div class="topbar-meta">
          <span id="scene-duration">--</span>
          <span id="scene-fps">--</span>
          <span id="scene-elements">--</span>
          <a class="github-link" href="https://github.com/COPPSARY/Motionly" target="_blank" rel="noreferrer" aria-label="Motionly on GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.71.5.1.68-.22.68-.49v-1.72c-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.95c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92v2.77c0 .27.18.59.69.49A10.05 10.05 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"/>
            </svg>
          </a>
        </div>
      </header>

      <section class="workspace">
        <aside class="editor-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Source</p>
              <h2>Codex Showcase</h2>
            </div>
            <div class="button-row">
              <button id="apply-scene" type="button">Apply</button>
              <button id="reload-scene" type="button">Reload</button>
            </div>
          </div>
          <textarea id="scene-source" spellcheck="false"></textarea>
        </aside>

        <section class="preview-panel">
          <div class="preview-header">
            <div>
              <p class="panel-kicker">Preview</p>
              <h2>Frame Renderer</h2>
            </div>
            <span id="export-status" aria-live="polite">Loading</span>
          </div>

          <div class="stage-shell">
            <canvas id="preview-canvas" width="1920" height="1080"></canvas>
          </div>

          <div class="controls">
            <button id="play-toggle" class="primary" type="button">Play</button>
            <button id="restart" type="button">Restart</button>
            <input id="timeline" type="range" min="0" max="1" step="0.0001" value="0">
            <span id="time-readout">0.00s</span>
          </div>

          <div class="export-panel">
            <label>
              Size
              <select id="export-size">
                <option value="720">720p</option>
                <option value="1080" selected>1080p</option>
                <option value="1440">1440p</option>
                <option value="2160">4K</option>
              </select>
            </label>
            <label>
              FPS
              <select id="export-fps">
                <option value="30">30</option>
                <option value="60" selected>60</option>
              </select>
            </label>
            <button id="export-webm" type="button">Export WebM</button>
            <button id="export-mp4" type="button">Export MP4</button>
            <button id="export-gif" type="button">Export GIF</button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./src/app/main.js"></script>
  </body>
</html>
